<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; padding-bottom: 30px; }
        .card { margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        textarea { font-family: 'Courier New', monospace; font-size: 13px; resize: vertical; }
        .badge-online { background: #198754; }
        .badge-offline { background: #dc3545; }
        .btn-group-custom .btn { min-width: 100px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1"><i class="fas fa-robot me-2"></i>Bot Control Panel</span>
        <div class="d-flex">
            <span class="text-light me-3" id="current-user"></span>
            <span class="text-light me-3"><span id="nav-status-badge" class="badge bg-secondary">Checking...</span></span>
            <button class="btn btn-sm btn-outline-light" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <!-- Status Card -->
    <div class="card">
        <div class="card-header bg-primary text-white"><i class="fas fa-chart-line me-2"></i>Bot Status (PM2)</div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Bot Name:</strong> <span id="bot-name">-</span></p>
                    <p><strong>Version:</strong> <span id="bot-version">-</span></p>
                    <p><strong>Status:</strong> <span id="bot-status-badge" class="badge bg-secondary">Checking...</span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>Uptime:</strong> <span id="bot-uptime">-</span></p>
                    <p><strong>Restarts:</strong> <span id="restart-count">0</span></p>
                    <p><strong>CPU:</strong> <span id="bot-cpu">0</span>% | <strong>MEM:</strong> <span id="bot-mem">0</span> MB</p>
                </div>
            </div>
            <button class="btn btn-outline-primary btn-sm mt-2" onclick="refreshStatus()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </div>

    <!-- Control Card -->
    <div class="card">
        <div class="card-header bg-success text-white"><i class="fas fa-gamepad me-2"></i>PM2 Control</div>
        <div class="card-body">
            <div class="btn-group">
                <button class="btn btn-success" onclick="startBot()"><i class="fas fa-play"></i> Start</button>
                <button class="btn btn-warning text-white" onclick="stopBot()"><i class="fas fa-stop"></i> Stop</button>
                <button class="btn btn-danger" onclick="restartBot()"><i class="fas fa-redo-alt"></i> Restart</button>
            </div>
            <div id="control-result" class="mt-2 text-muted"></div>
        </div>
    </div>

    <!-- Members Management Card -->
    <div class="card">
        <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
            <span><i class="fas fa-users me-2"></i>Members Management</span>
            <button class="btn btn-sm btn-light" onclick="showAddUserModal()" id="add-user-btn"><i class="fas fa-plus"></i> Add Member</button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Email</th><th>Permission</th><th>Created</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="users-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Config Editor Card -->
    <div class="card">
        <div class="card-header bg-secondary text-white"><i class="fas fa-cog me-2"></i>config.json Editor</div>
        <div class="card-body">
            <textarea id="config-editor" rows="8" class="form-control mb-2"></textarea>
            <button class="btn btn-outline-secondary" onclick="loadConfig()">Load</button>
            <button class="btn btn-primary" onclick="saveConfig()">Save</button>
            <span id="config-result" class="ms-2"></span>
        </div>
    </div>

    <!-- AppState Editor Card -->
    <div class="card">
        <div class="card-header bg-dark text-white"><i class="fas fa-key me-2"></i>appstate.json Editor</div>
        <div class="card-body">
            <textarea id="appstate-editor" rows="8" class="form-control mb-2"></textarea>
            <button class="btn btn-outline-secondary" onclick="loadAppState()">Load</button>
            <button class="btn btn-primary" onclick="saveAppState()">Save</button>
            <span id="appstate-result" class="ms-2"></span>
        </div>
    </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle">Add Member</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-user-id">
                <div class="mb-3"><label class="form-label">Name</label><input type="text" id="user-name" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Email</label><input type="email" id="user-email" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Password</label><input type="password" id="user-password" class="form-control" placeholder="Leave blank to keep unchanged"></div>
                <div class="mb-3"><label class="form-label">Permission (0-3)</label>
                    <select id="user-permission" class="form-select">
                        <option value="0">0 - Member</option>
                        <option value="1">1 - Moderator</option>
                        <option value="2">2 - Admin</option>
                        <option value="3">3 - Owner</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentUser = null;
    let userModal;

    document.addEventListener('DOMContentLoaded', () => {
        userModal = new bootstrap.Modal(document.getElementById('userModal'));
        fetchCurrentUser();
        refreshStatus();
        loadUsers();
        loadConfig();
        loadAppState();
        setInterval(refreshStatus, 10000);
    });

    async function fetchCurrentUser() {
        const res = await fetch('/api/current-user');
        if (res.ok) {
            const data = await res.json();
            currentUser = data.user;
            document.getElementById('current-user').innerText = `👤 ${data.user.name}`;
            // Hide add button if permission < 2
            if (data.user.permission < 2) {
                document.getElementById('add-user-btn').style.display = 'none';
            }
        } else {
            window.location.href = '/login';
        }
    }

    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login';
    }

    // -------------------- Bot Status & Control --------------------
    async function refreshStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('bot-name').innerText = data.botName || '-';
            document.getElementById('bot-version').innerText = data.version || '-';
            document.getElementById('restart-count').innerText = data.restartCount || 0;
            document.getElementById('bot-cpu').innerText = (data.cpu || 0).toFixed(1);
            document.getElementById('bot-mem').innerText = ((data.memory || 0) / 1048576).toFixed(1);
            const statusBadge = document.getElementById('bot-status-badge');
            const navBadge = document.getElementById('nav-status-badge');
            if (data.online) {
                statusBadge.className = 'badge badge-online';
                statusBadge.innerText = 'ONLINE';
                navBadge.className = 'badge badge-online';
                navBadge.innerText = 'ONLINE';
            } else {
                statusBadge.className = 'badge badge-offline';
                statusBadge.innerText = data.status === 'stopped' ? 'STOPPED' : 'OFFLINE';
                navBadge.className = 'badge badge-offline';
                navBadge.innerText = 'OFFLINE';
            }
            document.getElementById('bot-uptime').innerText = data.uptime || '0s';
        } catch (e) {}
    }

    async function startBot() { await fetch('/api/start', {method:'POST'}); refreshStatus(); }
    async function stopBot() { if(confirm('Stop bot?')) { await fetch('/api/stop', {method:'POST'}); refreshStatus(); } }
    async function restartBot() { if(confirm('Restart bot?')) { await fetch('/api/restart', {method:'POST'}); setTimeout(refreshStatus, 3000); } }

    // -------------------- Config / AppState --------------------
    async function loadConfig() {
        const res = await fetch('/api/config');
        const data = await res.json();
        document.getElementById('config-editor').value = JSON.stringify(data, null, 2);
    }
    async function saveConfig() {
        try {
            const config = JSON.parse(document.getElementById('config-editor').value);
            await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config) });
            document.getElementById('config-result').innerHTML = '<span class="text-success">Saved!</span>';
        } catch(e) { alert('Invalid JSON'); }
    }
    async function loadAppState() {
        const res = await fetch('/api/appstate');
        const data = await res.json();
        document.getElementById('appstate-editor').value = JSON.stringify(data, null, 2);
    }
    async function saveAppState() {
        try {
            const state = JSON.parse(document.getElementById('appstate-editor').value);
            await fetch('/api/appstate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(state) });
            document.getElementById('appstate-result').innerHTML = '<span class="text-success">Saved!</span>';
        } catch(e) { alert('Invalid JSON'); }
    }

    // -------------------- User Management --------------------
    async function loadUsers() {
        const res = await fetch('/api/users');
        const users = await res.json();
        const tbody = document.getElementById('users-table-body');
        tbody.innerHTML = '';
        users.forEach(u => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.permission}</td><td>${u.created_at?.split(' ')[0]||''}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="editUser(${u.id})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})" ${currentUser?.permission < 3 ? 'disabled' : ''}><i class="fas fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.editUser = async function(id) {
        const res = await fetch('/api/users');
        const users = await res.json();
        const user = users.find(u => u.id === id);
        if (!user) return;
        document.getElementById('userModalTitle').innerText = 'Edit Member';
        document.getElementById('edit-user-id').value = user.id;
        document.getElementById('user-name').value = user.name;
        document.getElementById('user-email').value = user.email;
        document.getElementById('user-password').value = '';
        document.getElementById('user-permission').value = user.permission;
        userModal.show();
    };

    window.deleteUser = async function(id) {
        if (!confirm('Delete this user?')) return;
        const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
        if (res.ok) { loadUsers(); } else { alert('Failed to delete.'); }
    };

    window.showAddUserModal = function() {
        document.getElementById('userModalTitle').innerText = 'Add Member';
        document.getElementById('edit-user-id').value = '';
        document.getElementById('user-name').value = '';
        document.getElementById('user-email').value = '';
        document.getElementById('user-password').value = '';
        document.getElementById('user-permission').value = '0';
        userModal.show();
    };

    window.saveUser = async function() {
        const id = document.getElementById('edit-user-id').value;
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        const password = document.getElementById('user-password').value;
        const permission = parseInt(document.getElementById('user-permission').value);

        if (!name || !email) return alert('Name and email required.');
        if (!id && !password) return alert('Password required for new user.');

        const payload = { name, email, permission };
        if (password) payload.password = password;

        const url = id ? `/api/users/${id}` : '/api/users';
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        if (res.ok) {
            userModal.hide();
            loadUsers();
        } else {
            const err = await res.json();
            alert(err.error || 'Failed to save user.');
        }
    };
</script>
</body>
</html>
