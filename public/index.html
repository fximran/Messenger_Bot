<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 { margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
            margin-bottom: 10px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        button.danger { background: #e53e3e; }
        button.success { background: #38a169; }
        button.warning { background: #ed8936; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-running { background: #38a169; color: white; }
        .status-stopped { background: #e53e3e; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .status-item { background: #f4f4f4; padding: 10px; border-radius: 5px; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Bot Control Panel</h1>
        
        <div class="card">
            <h2>⚡ Bot Control</h2>
            <button id="startBtn" class="success" onclick="startBot()">▶️ Start Bot</button>
            <button id="stopBtn" class="danger" onclick="stopBot()">⏹️ Stop Bot</button>
            <button id="restartBtn" class="warning" onclick="restartBot()">🔄 Restart Bot</button>
            <span id="botStatusText" style="margin-left: 15px;"></span>
        </div>
        
        <div class="card">
            <h2>📊 Bot Status</h2>
            <div id="status" class="grid">Loading...</div>
        </div>
        
        <div class="card">
            <h2>⚙️ Config Editor</h2>
            <textarea id="configEditor" rows="15"></textarea>
            <button onclick="updateConfig()">💾 Save Config</button>
            <button onclick="loadConfig()">🔄 Reload</button>
        </div>
        
        <div class="card">
            <h2>🔑 Appstate Editor</h2>
            <textarea id="appstateEditor" rows="10"></textarea>
            <button onclick="updateAppstate()">💾 Save Appstate</button>
            <button onclick="loadAppstate()">🔄 Reload</button>
        </div>
    </div>
    
    <script>
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.success) {
                    const hours = Math.floor(data.uptime / 3600);
                    const minutes = Math.floor((data.uptime % 3600) / 60);
                    
                    document.getElementById('status').innerHTML = `
                        <div class="status-item"><strong>🤖 Name:</strong> ${data.botName}</div>
                        <div class="status-item"><strong>🔧 Prefix:</strong> ${data.prefix}</div>
                        <div class="status-item"><strong>🌐 Language:</strong> ${data.language}</div>
                        <div class="status-item"><strong>👑 Admins:</strong> ${data.adminCount}</div>
                        <div class="status-item"><strong>🔑 Appstate:</strong> ${data.appstateExists ? '✅ Exists' : '❌ Missing'}</div>
                        <div class="status-item"><strong>🤖 Bot:</strong> <span class="status-badge ${data.botRunning ? 'status-running' : 'status-stopped'}">${data.botRunning ? 'RUNNING' : 'STOPPED'}</span></div>
                    `;
                    
                    const statusText = document.getElementById('botStatusText');
                    if (statusText) {
                        statusText.innerHTML = data.botRunning ? '<span class="status-badge status-running">● Bot Running</span>' : '<span class="status-badge status-stopped">● Bot Stopped</span>';
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        async function startBot() {
            const response = await fetch('/api/bot/start', { method: 'POST' });
            const data = await response.json();
            alert(data.message);
            setTimeout(loadStatus, 2000);
        }
        
        async function stopBot() {
            if (confirm('Stop the bot?')) {
                const response = await fetch('/api/bot/stop', { method: 'POST' });
                const data = await response.json();
                alert(data.message);
                setTimeout(loadStatus, 1000);
            }
        }
        
        async function restartBot() {
            if (confirm('Restart the bot?')) {
                const response = await fetch('/api/bot/restart', { method: 'POST' });
                const data = await response.json();
                alert(data.message);
                setTimeout(loadStatus, 3000);
            }
        }
        
        async function loadConfig() {
            const response = await fetch('/api/config');
            const data = await response.json();
            if (data.success) document.getElementById('configEditor').value = JSON.stringify(data.config, null, 2);
            else alert('Error: ' + data.error);
        }
        
        async function updateConfig() {
            try {
                const newConfig = JSON.parse(document.getElementById('configEditor').value);
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newConfig)
                });
                const data = await response.json();
                alert(data.message);
            } catch(e) { alert('Invalid JSON!'); }
        }
        
        async function loadAppstate() {
            const response = await fetch('/api/appstate');
            const data = await response.json();
            if (data.success) document.getElementById('appstateEditor').value = JSON.stringify(data.appstate, null, 2);
            else alert('Error: ' + data.error);
        }
        
        async function updateAppstate() {
            try {
                const newAppstate = JSON.parse(document.getElementById('appstateEditor').value);
                const response = await fetch('/api/appstate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newAppstate)
                });
                const data = await response.json();
                alert(data.message);
            } catch(e) { alert('Invalid JSON!'); }
        }
        
        loadStatus();
        loadConfig();
        loadAppstate();
        setInterval(loadStatus, 10000);
    </script>
</body>
</html>
